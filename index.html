<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Royal Blossom Puppies | Premium Boutique</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#f7f1ea,#fff);
color:#333;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
background:white;
position:sticky;
top:0;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

header h1{color:#8b6b4f;}

nav a{
margin:0 12px;
text-decoration:none;
color:#555;
font-weight:bold;
}

/* HERO */
.hero{
height:85vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:url('https://images.unsplash.com/photo-1517423440428-a5a00ad493e8?q=80&w=1600&auto=format&fit=crop') center/cover;
position:relative;
color:white;
}

.hero::after{
content:'';
position:absolute;
inset:0;
background:rgba(0,0,0,0.5);
}

.hero-content{position:relative;z-index:2;}

.hero h2{font-size:52px;margin:0;}

.btn{
background:linear-gradient(135deg,#b58b61,#d6b48d);
border:none;
padding:14px 26px;
border-radius:30px;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
margin:5px;
}

.btn:hover{transform:scale(1.05);}

/* GRID */
.section{
padding:70px 20px;
max-width:1200px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{transform:translateY(-5px);}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.card-content{padding:16px;}

.price{
color:#8b6b4f;
font-size:22px;
font-weight:bold;
}

/* MODAL */
#modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:25px;
border-radius:20px;
width:90%;
max-width:420px;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:12px 16px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>Royal Blossom Puppies</h1>
<nav>
<a href="#puppies">Puppies</a>
<a href="admin.html">Admin</a>
</nav>
</header>

<section class="hero">
<div class="hero-content">
<h2>Luxury Puppies Raised With Love</h2>
<p>Maltese • Maltipoo • Pomeranian</p>
</div>
</section>

<section class="section" id="puppies">
<h2 style="text-align:center;">Available Puppies</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1583511655857-d19b40a7a54e">
<div class="card-content">
<h3>Bella</h3>
<p class="price">$1000</p>
<button class="btn" onclick="openModal('Bella')">Reserve</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1517423440428-a5a00ad493e8">
<div class="card-content">
<h3>Teddy</h3>
<p class="price">$800</p>
<button class="btn" onclick="openModal('Teddy')">Reserve</button>
</div>
</div>

</div>
</section>

<!-- MODAL -->
<div id="modal">
<div class="modal-box">
<h2>Reserve Puppy</h2>
<p id="selected"></p>

<input id="name" placeholder="Your Name"><br><br>
<input id="email" placeholder="Your Email"><br><br>

<button class="btn" onclick="payNow()">Proceed to Payment</button>
<button class="btn" onclick="submitReservation()">Submit</button>
<button class="btn" onclick="closeModal()">Close</button>
</div>
</div>

<a class="whatsapp" href="https://wa.me/YOURNUMBER">💬 WhatsApp</a>

<script>
let selectedPuppy="";

function openModal(name){
selectedPuppy=name;
document.getElementById("selected").innerText="Puppy: "+name;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function payNow(){
window.location.href="https://paypal.me/YOURUSERNAME/250";
}

async function submitReservation(){

const name=document.getElementById("name").value;
const email=document.getElementById("email").value;

await fetch("/api/adoption",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,email,puppy:selectedPuppy})
});

alert("Reservation Sent!");
closeModal();
}
</script>

</body>
</html>
